services:
  db:
    image: postgres:16
    container_name: patient-service-db
    environment:
      POSTGRES_DB: patient_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - patient_service_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d patient_service_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/PatientService.Api/Dockerfile
    container_name: patient-service-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=patient_service_db;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  seeder:
    build:
      context: .
      dockerfile: src/PatientService.Seeder/Dockerfile
    container_name: patient-service-seeder
    environment:
      PATIENT_API_BASE_URL: http://api:8080
      PATIENT_SEED_COUNT: 100
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - seed

volumes:
  patient_service_postgres_data: